name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: GHC ${{ matrix.ghc }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ghc: ['9.4.8', '9.6.6', '9.8.2']
    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        id: setup
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: 'latest'

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: ${{ steps.setup.outputs.cabal-store }}
          key: ${{ runner.os }}-ghc${{ matrix.ghc }}-${{ hashFiles('**/*.cabal') }}
          restore-keys: ${{ runner.os }}-ghc${{ matrix.ghc }}-

      - run: cabal update
      - run: cabal build all --enable-tests
      - run: cabal test all --enable-tests

  # Validates the declared lower bounds against the boot libraries GHC
  # 9.4.8 actually ships (mtl 2.2, transformers 0.5, ...) by pinning them
  # to the installed versions. This is the case a fixed package set (e.g.
  # nix pkgsStatic) cannot upgrade away, so it must resolve; too-tight a
  # lower bound on a boot lib fails here. Non-boot deps stay at their
  # latest, avoiding ancient-transitive noise. Constraints for packages
  # not in the plan are ignored by cabal, so the list is uniform across
  # forks.
  boot-floor:
    name: Boot-lib floor (GHC 9.4.8, installed boot libs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.4.8'
          cabal-version: 'latest'
      - run: cabal update
      - run: |
          cabal build all --enable-tests \
            --constraint='mtl installed' \
            --constraint='transformers installed' \
            --constraint='containers installed' \
            --constraint='text installed' \
            --constraint='bytestring installed' \
            --constraint='stm installed' \
            --constraint='time installed'
